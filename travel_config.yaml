packing_lists:
  лето:
    обязательно:
      - легкая одежда
      - шорты/юбки
      - футболки
      - купальник/плавки
      - головной убор
      - солнцезащитные очки
      - крем от солнца
  зима:
    обязательно:
      - теплая куртка
      - свитер
      - термобелье
      - шапка
      - шарф
      - перчатки
      - теплая обувь
  весна-осень:
    обязательно:
      - куртка от ветра/дождя
      - джинсы/брюки
      - свитер/кофта
      - зонт
      - удобная обувь


travel_tips:
  общие:
    - Сделайте копии документов
    - Сообщите родным о маршруте
    - Заранее узнайте экстренные номера
    - Скачайте карты оффлайн
    - Изучите местные обычаи
  документы:
    - Паспорт/ID
    - Страховка
    - Билеты (распечатать + в телефоне)
    - Бронь отеля
    - Водительские права (если нужно)

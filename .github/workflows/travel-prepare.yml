name: Подготовка к поездке


on:
  workflow_dispatch:
    inputs:
      travel_date:
        description: 'Дата поездки (ГГГГ-ММ-ДД)'
        required: true
        default: '2024-12-01'
        type: string


jobs:
  countdown:
    runs-on: ubuntu-latest
    steps:
      - name: Загружаем код
        uses: actions/checkout@v4


      - name: Рассчитываем дни до поездки
        id: days
        run: |
          TRAVEL_DATE="${{ github.event.inputs.travel_date }}"
          TODAY=$(date +%s)
          TRAVEL=$(date -d "$TRAVEL_DATE" +%s 2>/dev/null || echo "0")
          if [ "$TRAVEL" = "0" ]; then
            DAYS_LEFT="Ошибка формата даты"
          else
            SECONDS_LEFT=$((TRAVEL - TODAY))
            DAYS_LEFT=$((SECONDS_LEFT / 86400))
          fi
          echo "left=$DAYS_LEFT" >> $GITHUB_OUTPUT


      - name: Формируем чеклист
        id: checklist
        run: |
          DAYS="${{ steps.days.outputs.left }}"
          if [ "$DAYS" -le 1 ] 2>/dev/null; then
            MSG="🚨 ЗАВТРА ЕДЕМ!%0A%0A• Собрать вещи%0A• Проверить документы%0A• Распечатать билеты%0A• Зарядить гаджеты"
          elif [ "$DAYS" -le 3 ] 2>/dev/null; then
            MSG="✈️ Осталось $DAYS дня!%0A%0A• Купить билеты%0A• Забронировать отель%0A• Обменять валюту%0A• Проверить паспорт"
          elif [ "$DAYS" -le 7 ] 2>/dev/null; then
            MSG="📋 Осталось $DAYS дней%0A%0A• Составить маршрут%0A• Изучить достопримечательности%0A• Купить страховку"
          else
            MSG="🗓️ До поездки $DAYS дней%0A%0A• Начать копить деньги%0A• Выбрать отель%0A• Посмотреть билеты"
          fi
          echo "text=$MSG" >> $GITHUB_OUTPUT


      - name: Отправляем в Telegram
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="${{ steps.checklist.outputs.text }}"
